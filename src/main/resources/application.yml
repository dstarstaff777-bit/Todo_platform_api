spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/platform
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    http:
      encoding:
        charset: UTF-8
        enabled: true
        force: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:this-is-a-very-long-secret-key-for-jwt-tokens-minimum-32-characters}
  expiration: 1800000

server:
  port: 8080
  shutdown: graceful

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level %msg%n"
    file: "%d{HH:mm:ss.SSS} %-5level %msg%n"
  level:
    root: INFO
    com.yourpackage: DEBUG
    org.springframework.web: INFO
    org.hibernate: WARN